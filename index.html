<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>classroomspot</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
* { box-sizing: border-box; font-family: Inter, system-ui; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
}

/* ===== CUSTOM CURSOR - WHITE STAR ===== */
* {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/></svg>') 12 12, auto !important;
}

/* ===== FALLING STARS BACKGROUND ===== */
.stars-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #00d4ff;
    border-radius: 50%;
    animation: twinkle 3s infinite;
    box-shadow: 0 0 6px #00d4ff;
}

.falling-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #00d4ff;
    border-radius: 50%;
    box-shadow: 0 0 10px 2px rgba(0, 212, 255, 0.8);
    animation: fall linear infinite;
}

.falling-star::before {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,212,255,1) 0%, rgba(0,212,255,0) 100%);
    right: 2px;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

@keyframes fall {
    0% {
        transform: translateX(0) translateY(0) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translateX(-500px) translateY(500px) rotate(45deg);
        opacity: 0;
    }
}

/* ===== NEON TEXT EFFECTS ===== */
.neon-text {
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    font-weight: 900;
    font-size: 5rem;
    text-shadow: 
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px #00d4ff,
        0 0 40px #00d4ff,
        0 0 80px #00d4ff,
        0 0 90px #00d4ff,
        0 0 100px #00d4ff,
        0 0 150px #00d4ff;
    animation: flicker 3s infinite alternate;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}

@keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% {
        text-shadow: 
            0 0 5px #fff,
            0 0 10px #fff,
            0 0 20px #00d4ff,
            0 0 40px #00d4ff,
            0 0 80px #00d4ff,
            0 0 90px #00d4ff,
            0 0 100px #00d4ff,
            0 0 150px #00d4ff;
        opacity: 1;
    }
    20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.8;
    }
}

/* ===== TOP BAR ===== */
.browser-ui {
    height: 96px;
    background: rgba(10, 10, 20, 0.85);
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid #00d4ff;
    z-index: 10;
    position: relative;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

/* ===== TABS ===== */
.tabs {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    overflow-x: auto;
}

.tab {
    height: 28px;
    min-width: 160px;
    max-width: 220px;
    padding: 0 12px;
    border-radius: 8px 8px 0 0;
    background: #1a1a2e;
    color: #ddd;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    border: 1px solid transparent;
    font-size: 12px;
}

.tab.active {
    background: #0f0f1e;
    color: #00d4ff;
    border-color: #00d4ff;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.1);
    text-shadow: 0 0 5px #00d4ff;
}

.tab span {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.tab i {
    opacity: .6;
    transition: all 0.3s ease;
}
.tab i:hover {
    opacity: 1;
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
}

.newtab {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #aaa;
    transition: all 0.3s ease;
}
.newtab:hover { 
    background: #1a1a2e; 
    color: #00d4ff;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
    text-shadow: 0 0 5px #00d4ff;
}

/* ===== NAV BAR ===== */
.navbar {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
}

.navbar button {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #bbb;
    transition: all 0.3s ease;
}
.navbar button:hover {
    background: #1a1a2e;
    color: #00d4ff;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
    text-shadow: 0 0 5px #00d4ff;
    transform: scale(1.1);
}

/* ===== URL BAR ===== */
.urlbar {
    flex: 1;
    height: 36px;
    background: #0f0f1e;
    border-radius: 18px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    color: white;
    border: 1px solid #333;
    transition: all 0.3s ease;
}

.urlbar:focus-within {
    border-color: #00d4ff;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.1);
}

.urlbar input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #00d4ff;
    font-size: 14px;
    font-family: 'Orbitron', sans-serif;
}

.urlbar input::placeholder {
    color: #555;
    font-family: 'Orbitron', sans-serif;
}

/* ===== VIEWPORT ===== */
.viewframe {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    border: none;
    display: none;
    z-index: 5;
}

.viewframe.active {
    display: block;
}

/* ===== NTP ===== */
.ntp {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    pointer-events: none;
    z-index: 5;
    gap: 30px;
}

/* ===== CENTER SEARCH BAR (below title) ===== */
.center-search-container {
    pointer-events: auto;
    width: 100%;
    max-width: 600px;
    padding: 0 20px;
}

.center-search {
    width: 100%;
    height: 50px;
    background: rgba(10, 10, 20, 0.9);
    border-radius: 25px;
    border: 1px solid #00d4ff;
    display: flex;
    align-items: center;
    padding: 0 25px;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
}

.center-search:focus-within {
    border-color: #00d4ff;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), inset 0 0 20px rgba(0, 212, 255, 0.1);
}

.center-search input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #888;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
}

.center-search input::placeholder {
    color: #555;
    font-family: 'Inter', sans-serif;
}
</style>
</head>

<body>

<!-- Falling Stars Background -->
<div class="stars-container" id="starsContainer"></div>

<div class="browser-ui">
    <div class="tabs" id="tabs">
        <button class="newtab" id="newtab"><i class="fas fa-plus"></i></button>
    </div>

    <div class="navbar">
        <button id="back"><i class="fas fa-arrow-left"></i></button>
        <button id="forward"><i class="fas fa-arrow-right"></i></button>
        <button id="reload"><i class="fas fa-rotate-right"></i></button>

        <form class="urlbar" id="form">
            <input id="url" placeholder="Search or enter address">
        </form>

        <button id="popout"><i class="fas fa-external-link"></i></button>
    </div>
</div>

<div class="ntp" id="ntp">
    <h1 class="neon-text">classroomspot</h1>
    
    <!-- Center Search Bar (below title like the image) -->
    <div class="center-search-container">
        <form class="center-search" id="centerForm">
            <input id="centerUrl" placeholder="Search Google or type an URL">
        </form>
    </div>
</div>

<script>
// Create falling stars background
function createStars() {
    const container = document.getElementById('starsContainer');
    const starCount = 150;
    
    // Create static twinkling stars
    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        
        // Random star sizes
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        
        container.appendChild(star);
    }
    
    // Create falling stars
    function createFallingStar() {
        const fallingStar = document.createElement('div');
        fallingStar.className = 'falling-star';
        fallingStar.style.left = (Math.random() * 100 + 20) + '%';
        fallingStar.style.top = '-10px';
        fallingStar.style.animationDuration = (Math.random() * 2 + 1) + 's';
        
        container.appendChild(fallingStar);
        
        setTimeout(() => {
            fallingStar.remove();
        }, 4000);
    }
    
    // Create falling stars periodically
    setInterval(createFallingStar, 600);
}

createStars();

navigator.serviceWorker?.register("/uv/sw.js")

const connection = new BareMux.BareMuxConnection("/baremux/worker.js")
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }])

const tabsEl = document.getElementById("tabs")
const newTabBtn = document.getElementById("newtab")
const urlInput = document.getElementById("url")
const centerUrlInput = document.getElementById("centerUrl")
const ntp = document.getElementById("ntp")

let tabs = []
let activeId = null
let idCounter = 0

function createTab(url = "") {
    const id = idCounter++

    const iframe = document.createElement("iframe")
    iframe.className = "viewframe"
    iframe.dataset.id = id

    iframe.setAttribute("sandbox",
        "allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
    )

    document.body.appendChild(iframe)

    const tabBtn = document.createElement("div")
    tabBtn.className = "tab"
    tabBtn.dataset.id = id
    tabBtn.innerHTML = `<span>New Tab</span><i class="fas fa-xmark"></i>`

    tabBtn.addEventListener("click", e => {
        if (e.target.tagName === "I") closeTab(id)
        else activateTab(id)
    })

    tabsEl.insertBefore(tabBtn, newTabBtn)

    tabs.push({ id, iframe, tabBtn, history: [], index: -1 })
    activateTab(id)

    if (url) navigate(url)
}

function activateTab(id) {
    activeId = id

    tabs.forEach(t => {
        t.iframe.classList.toggle("active", t.id === id)
        t.tabBtn.classList.toggle("active", t.id === id)
    })

    const tab = getTab()
    if (!tab) return

    if (tab.index >= 0) {
        urlInput.value = tab.history[tab.index]
        ntp.style.display = "none"
    } else {
        urlInput.value = ""
        ntp.style.display = "flex"
    }
}

function closeTab(id) {
    if (tabs.length === 1) return

    const i = tabs.findIndex(t => t.id === id)
    const tab = tabs[i]

    tab.iframe.remove()
    tab.tabBtn.remove()
    tabs.splice(i, 1)

    activateTab(tabs[Math.max(0, i - 1)].id)
}

function normalize(input) {
    if (!input.includes(".")) {
        return "https://search.brave.com/search?q=" + encodeURIComponent(input)
    }
    if (!input.startsWith("http")) return "https://" + input
    return input
}

function navigate(input, push = true) {
    const tab = getTab()
    if (!tab) return

    const url = normalize(input)

    if (push) {
        tab.history = tab.history.slice(0, tab.index + 1)
        tab.history.push(url)
        tab.index++
    }

    tab.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url)
    urlInput.value = url
    centerUrlInput.value = url
    ntp.style.display = "none"

    tab.iframe.onload = () => {
        tab.tabBtn.querySelector("span").textContent =
            tab.iframe.contentDocument?.title || new URL(url).hostname
    }
}

function getTab() {
    return tabs.find(t => t.id === activeId)
}

/* ===== CONTROLS ===== */
back.onclick = () => {
    const t = getTab()
    if (!t || t.index <= 0) return
    t.index--
    navigate(t.history[t.index], false)
}

forward.onclick = () => {
    const t = getTab()
    if (!t || t.index >= t.history.length - 1) return
    t.index++
    navigate(t.history[t.index], false)
}

reload.onclick = () => {
    const t = getTab()
    if (!t) return
    t.iframe.src = t.iframe.src
}

popout.onclick = () => {
    const t = getTab()
    if (!t) return
    window.open(t.iframe.src, "_blank")
}

form.onsubmit = e => {
    e.preventDefault()
    if (urlInput.value.trim()) navigate(urlInput.value)
}

// Center search form handler
document.getElementById("centerForm").onsubmit = e => {
    e.preventDefault()
    if (centerUrlInput.value.trim()) navigate(centerUrlInput.value)
}

newTabBtn.onclick = () => createTab()

createTab()
</script>

</body>
</html>
